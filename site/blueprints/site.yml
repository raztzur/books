# Site Dashboard - Book Request Library

columns:
  - width: 2/3
    sections:
      pending:
        type: pages
        label: Pending Requests
        query: kirby.page("home").children.filterBy("chosen", "!=", "true")
        template: book
        status: all
        layout: table
        sortBy: votes desc
        columns:
          title:
            label: Title
            width: 1/2
          suggested_by:
            label: Requested By
            width: 1/4
          votes:
            label: Votes
            width: 1/6

      ordered:
        type: pages
        label: Ordered Books
        query: kirby.page("home").children.filterBy("chosen", "true")
        template: book
        status: all
        layout: table
        sortBy: title asc
        columns:
          title:
            label: Title
            width: 1/2
          suggested_by:
            label: Requested By
            width: 1/4
          votes:
            label: Votes
            width: 1/6

  - width: 1/3
    sections:
      stats:
        type: stats
        label: Overview
        reports:
          - label: Total Requests
            value: "{{ kirby.page('home').children.count }}"
            theme: positive
          - label: Ordered
            value: "{{ kirby.page('home').children.filterBy('chosen', 'true').count }}"
            theme: none
          - label: Pending
            value: "{{ kirby.page('home').children.filterBy('chosen', '!=', 'true').count }}"
            theme: yellow

      info:
        type: info
        label: Quick Help
        text: |
          **Managing Books**
          - Click a book title to edit details
          - Toggle "Ordered" when a book has been purchased
          - Books move between lists automatically
          
          **Public Site**
          - Users vote once per book (toggle on/off)
          - Ordered books appear dimmed
